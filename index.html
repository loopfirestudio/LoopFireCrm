<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loopfire · Marketing Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#121319;--ink-soft:#1A1C24;--ink-surface:#20232D;--ink-raised:#252934;--ink-border:#2C303C;
      --mist:#EDEBE6;--mist-dim:#9A9CA8;--mist-faint:#5F6270;
      --violet:#8B7CFF;--violet-soft:#6F5FE0;--ember:#FFB454;--coral:#FF6F61;--mint:#5FE0B7;--sky:#63B3FF;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{background:var(--ink);color:var(--mist);font-family:"Inter",sans-serif;-webkit-font-smoothing:antialiased}
    button,input,select,textarea{font:inherit}
    button{color:inherit}
    ::selection{background:var(--violet);color:var(--ink)}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-thumb{background:var(--ink-border);border-radius:8px}
    :focus-visible{outline:2px solid var(--violet);outline-offset:2px}
    .hidden{display:none!important}.mono{font-family:"JetBrains Mono",monospace}.muted{color:var(--mist-faint)}
    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{width:244px;flex-shrink:0;border-right:1px solid var(--ink-border);background:var(--ink-soft);display:flex;flex-direction:column}
    .brand{padding:22px 18px 18px;display:flex;align-items:center;gap:10px}
    .brand-name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;margin:0}
    .brand-sub{font-size:10px;color:var(--mist-faint);letter-spacing:.6px;margin:3px 0 0}
    .nav{flex:1;padding:0 10px 16px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
    .nav-section{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--mist-faint);padding:14px 10px 5px}
    .nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border-radius:8px;background:transparent;border:none;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--mist-dim);transition:.15s}
    .nav-item:hover{color:var(--mist);background:rgba(255,255,255,.03)}
    .nav-item.active{background:var(--ink-surface);color:var(--mist)}
    .nav-item.active svg{color:var(--violet)}
    .nav-count{margin-left:auto;font-size:10.5px;font-family:"JetBrains Mono",monospace;color:var(--mist-faint)}
    .sidebar-foot{padding:13px 18px;border-top:1px solid var(--ink-border);font-size:10.5px;color:var(--mist-faint);line-height:1.5}
    .main{flex:1;overflow-y:auto;min-width:0}
    .view{padding:30px;max-width:1450px;margin:0 auto;animation:fadeUp .25s ease-out}
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .page-header{margin-bottom:24px}.page-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
    .page-header h1{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:23px;margin:0}
    .page-header p{font-size:12.5px;color:var(--mist-dim);margin:4px 0 0}
    .header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .error-banner{margin:20px 30px 0;padding:11px 13px;border-radius:8px;background:rgba(255,111,97,.1);border:1px solid rgba(255,111,97,.3);color:var(--coral);font-size:12px}
    .notice-banner{padding:11px 13px;border-radius:8px;background:rgba(139,124,255,.08);border:1px solid rgba(139,124,255,.22);font-size:12px;color:var(--mist-dim);margin-bottom:16px}
    .stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
    .stat-grid.six{grid-template-columns:repeat(6,minmax(0,1fr))}
    .stat-card,.card,.table-card,.campaign-card,.folder-card,.template-card,.task-card{
      background:var(--ink-soft);border:1px solid var(--ink-border);border-radius:14px;
      box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 8px 24px rgba(0,0,0,.28)
    }
    .stat-card{padding:15px;min-width:0}.stat-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
    .stat-top span{font-size:11.5px;color:var(--mist-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat-value{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:25px;line-height:1;margin:0}
    .stat-sub{font-size:10.8px;color:var(--mist-faint);margin:7px 0 0;line-height:1.35}
    .card{padding:18px}.card h2{font-size:13px;font-weight:600;margin:0 0 14px}.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .card-head h2{margin:0}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .btn-primary,.btn-secondary,.btn-ghost{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;cursor:pointer;font-weight:500;font-size:12.5px;padding:8px 12px;transition:.15s
    }
    .btn-primary{background:var(--violet);color:var(--ink);border:none}.btn-primary:hover{background:var(--violet-soft)}
    .btn-secondary{background:var(--ink-surface);color:var(--mist);border:1px solid var(--ink-border)}.btn-secondary:hover{border-color:var(--violet)}
    .btn-ghost{background:transparent;color:var(--mist-dim);border:1px solid transparent}.btn-ghost:hover{background:rgba(255,255,255,.03);color:var(--mist)}
    .icon-btn{display:inline-flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--mist-faint);cursor:pointer;padding:7px;border-radius:8px}
    .icon-btn:hover{color:var(--mist);background:rgba(255,255,255,.04)}.icon-btn.danger:hover{color:var(--coral);background:rgba(255,111,97,.1)}
    .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .tab-group{display:flex;background:var(--ink-soft);border:1px solid var(--ink-border);border-radius:8px;padding:2px}
    .tab{padding:6px 10px;border-radius:6px;font-size:11.5px;font-weight:500;background:none;border:none;color:var(--mist-faint);cursor:pointer}
    .tab.active{background:var(--ink-surface);color:var(--mist)}
    .select,.toolbar input{width:auto;background:var(--ink-soft);border:1px solid var(--ink-border);border-radius:8px;padding:7px 9px;font-size:11.5px;color:var(--mist-dim);outline:none}
    .search-box{position:relative;margin-left:auto}.search-box svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--mist-faint)}
    .search-box input{padding-left:30px;width:210px;color:var(--mist)}
    .table-card{overflow:auto}table{width:100%;border-collapse:collapse;text-align:left;min-width:760px}
    thead tr{border-bottom:1px solid var(--ink-border)}th{font-size:10px;text-transform:uppercase;letter-spacing:.45px;color:var(--mist-faint);font-weight:500;padding:11px 13px;white-space:nowrap}
    td{padding:11px 13px;border-bottom:1px solid var(--ink-border);font-size:11.8px;vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}tbody tr.clickable{cursor:pointer;transition:.15s}tbody tr.clickable:hover{background:rgba(255,255,255,.022)}
    .empty-row td{text-align:center;padding:36px 14px;color:var(--mist-faint)}
    .avatar{width:30px;height:30px;border-radius:999px;background:var(--ink-surface);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--mist-dim);flex-shrink:0}
    .row-name-cell{display:flex;align-items:center;gap:9px}.row-name{font-size:12.2px;color:var(--mist);margin:0}.row-sub{font-size:10.5px;color:var(--mist-faint);margin:2px 0 0}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 7px;border-radius:6px;font-size:10.5px;font-weight:500;white-space:nowrap}.badge-dot{width:5px;height:5px;border-radius:999px}
    .tag-list{display:flex;flex-wrap:wrap;gap:4px}.tag{font-size:9.8px;padding:2px 6px;border-radius:999px;background:rgba(139,124,255,.12);color:var(--violet)}
    .priority{display:inline-flex;align-items:center;gap:5px;color:var(--mist-dim)}.priority-dot{width:6px;height:6px;border-radius:999px}
    .progress{height:7px;background:var(--ink-surface);border-radius:999px;overflow:hidden}.progress>span{display:block;height:100%;border-radius:999px;background:var(--violet)}
    .metric-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}.metric-row:last-child{margin-bottom:0}.metric-label{font-size:11px;color:var(--mist-dim);width:92px}.metric-track{flex:1;height:8px;border-radius:999px;background:var(--ink-surface);overflow:hidden}.metric-bar{height:100%;background:var(--violet);border-radius:999px}.metric-value{font-size:10.5px;width:46px;text-align:right;color:var(--mist-dim)}
    .task-list{display:flex;flex-direction:column;gap:8px}.task-card{padding:13px;display:flex;align-items:flex-start;gap:11px}
    .task-check{width:18px;height:18px;border-radius:5px;border:1px solid var(--ink-border);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px}.task-check.done{background:var(--mint);border-color:var(--mint);color:var(--ink)}
    .task-main{flex:1;min-width:0}.task-title{font-size:12.5px;font-weight:500;margin:0}.task-title.done{text-decoration:line-through;color:var(--mist-faint)}
    .task-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:10.5px;color:var(--mist-faint);margin-top:5px}.task-actions{display:flex;gap:3px}
    .quick-add{display:flex;gap:8px;margin-top:12px}.quick-add input{flex:1}
    .campaign-grid,.folder-grid,.template-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .campaign-card,.folder-card,.template-card{padding:16px}.campaign-top,.folder-top,.template-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:12px}
    .campaign-title,.folder-title,.template-title{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;margin:0}
    .campaign-dates,.folder-sub,.template-sub{font-size:10.5px;color:var(--mist-faint);margin:3px 0 0}
    .campaign-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:13px}.mini-stat{text-align:center;background:var(--ink-surface);border-radius:8px;padding:8px 4px}.mini-stat strong{display:block;font-family:"JetBrains Mono",monospace;font-size:13px}.mini-stat span{display:block;font-size:8.7px;color:var(--mist-faint);margin-top:3px}
    .calendar-shell{background:var(--ink-soft);border:1px solid var(--ink-border);border-radius:14px;overflow:hidden}
    .calendar-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--ink-border)}
    .calendar-title{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr)}
    .calendar-weekday{padding:9px;text-align:center;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--mist-faint);border-bottom:1px solid var(--ink-border)}
    .calendar-day{min-height:112px;padding:8px;border-right:1px solid var(--ink-border);border-bottom:1px solid var(--ink-border);background:var(--ink-soft);cursor:pointer}.calendar-day:nth-child(7n){border-right:none}.calendar-day.outside{opacity:.35}.calendar-day.today{box-shadow:inset 0 0 0 1px var(--violet)}
    .day-number{font-size:10.5px;color:var(--mist-faint);margin-bottom:6px}.calendar-item{font-size:9.8px;padding:4px 6px;border-radius:5px;background:var(--ink-surface);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid var(--violet)}
    .folder-icon{width:38px;height:34px;border-radius:8px;background:rgba(255,180,84,.12);display:flex;align-items:center;justify-content:center;color:var(--ember)}
    .folder-count{font-size:20px;font-family:"Space Grotesk",sans-serif;font-weight:600;margin:8px 0 0}.folder-card{cursor:pointer}.folder-card:hover{border-color:var(--ember)}
    .template-body{font-size:11px;color:var(--mist-dim);line-height:1.5;white-space:pre-wrap;max-height:110px;overflow:hidden}
    .timeline{position:relative;padding-left:20px}.timeline:before{content:"";position:absolute;left:6px;top:5px;bottom:5px;width:1px;background:var(--ink-border)}
    .timeline-item{position:relative;padding:0 0 16px 12px}.timeline-item:before{content:"";position:absolute;left:-18px;top:4px;width:9px;height:9px;border-radius:999px;background:var(--violet);box-shadow:0 0 0 4px var(--ink-soft)}
    .timeline-time{font-family:"JetBrains Mono",monospace;font-size:9.8px;color:var(--mist-faint)}.timeline-text{font-size:12px;margin:3px 0 0}.timeline-meta{font-size:10.5px;color:var(--mist-faint);margin-top:3px}
    .report-hero{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:18px}.report-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.report-metric{background:var(--ink-surface);border-radius:10px;padding:12px}.report-metric strong{display:block;font-family:"Space Grotesk",sans-serif;font-size:21px}.report-metric span{font-size:10.5px;color:var(--mist-faint)}
    .drawer-overlay,.modal-overlay{position:fixed;inset:0;z-index:60;display:flex;justify-content:flex-end}.modal-overlay{justify-content:center;align-items:center;padding:20px}
    .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(2px)}
    .drawer{position:relative;width:520px;max-width:96vw;height:100%;background:var(--ink-soft);border-left:1px solid var(--ink-border);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-8px 0 28px rgba(0,0,0,.45)}
    .modal{position:relative;width:620px;max-width:96vw;max-height:92vh;background:var(--ink-soft);border:1px solid var(--ink-border);border-radius:14px;overflow-y:auto;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .drawer-head,.modal-head{position:sticky;top:0;z-index:2;background:var(--ink-soft);border-bottom:1px solid var(--ink-border);padding:15px 18px;display:flex;align-items:center;justify-content:space-between}
    .drawer-head h2,.modal-head h2{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;margin:0}
    .drawer-body,.modal-body{padding:18px;display:flex;flex-direction:column;gap:15px;flex:1}.drawer-foot,.modal-foot{position:sticky;bottom:0;background:var(--ink-soft);border-top:1px solid var(--ink-border);padding:14px 18px;display:flex;gap:8px}
    .field label{display:block;font-size:10.8px;font-weight:500;color:var(--mist-faint);margin-bottom:5px}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field-row.three{grid-template-columns:repeat(3,1fr)}
    input,select,textarea{width:100%;background:var(--ink-surface);border:1px solid var(--ink-border);border-radius:8px;padding:8px 9px;font-size:11.8px;color:var(--mist);outline:none;transition:.15s}
    input:focus,select:focus,textarea:focus{border-color:var(--violet)}textarea{resize:vertical;min-height:72px}
    .priority-group,.chip-group{display:flex;gap:6px;flex-wrap:wrap}.priority-group button,.chip-group button{padding:6px 9px;border-radius:999px;font-size:10.8px;font-weight:500;background:transparent;border:1px solid var(--ink-border);color:var(--mist-faint);cursor:pointer}
    .priority-group button.active,.chip-group button.active{border-color:var(--violet);color:var(--violet);background:rgba(139,124,255,.1)}
    .views-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.views-grid input{padding:7px 6px}.views-grid label{text-align:center;font-size:9.5px}
    .stepper-track{display:flex;align-items:center}.stepper-node{width:22px;height:22px;border-radius:999px;border:2px solid var(--ink-border);background:transparent;flex-shrink:0;cursor:pointer}.stepper-connector{height:2px;flex:1;margin:0 3px;background:var(--ink-border)}.stepper-labels{display:flex;justify-content:space-between;margin-top:6px}.stepper-labels span{font-size:8.8px;color:var(--mist-faint);width:38px;text-align:center}
    .checkbox-row{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--mist-dim);cursor:pointer}.checkbox-row input{width:auto;accent-color:var(--violet)}
    .section-title{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--mist-faint);margin:3px 0 -5px}
    .empty-state{padding:34px;text-align:center;color:var(--mist-faint)}.empty-state h3{color:var(--mist);font-family:"Space Grotesk",sans-serif;margin:0 0 7px}
    .status-line{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.link{color:var(--violet);text-decoration:none}.link:hover{text-decoration:underline}
    @media(max-width:1120px){.stat-grid.six{grid-template-columns:repeat(3,1fr)}.campaign-grid,.folder-grid,.template-grid{grid-template-columns:repeat(2,1fr)}.views-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:820px){.sidebar{width:190px}.view{padding:22px}.stat-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.report-hero{grid-template-columns:1fr}.campaign-grid,.folder-grid,.template-grid{grid-template-columns:1fr}.calendar-day{min-height:92px}.search-box{margin-left:0}.field-row,.field-row.three{grid-template-columns:1fr}}
    @media(max-width:620px){.sidebar{width:66px}.brand div,.nav-item span:not(.nav-count),.nav-section,.sidebar-foot{display:none}.brand{justify-content:center;padding:18px 0}.nav-item{justify-content:center;padding:10px}.nav-count{display:none}.view{padding:16px}.stat-grid,.stat-grid.six{grid-template-columns:1fr 1fr}.page-header-row{flex-direction:column}.calendar-day{min-height:72px;padding:4px}.calendar-item{font-size:0;height:8px;padding:0}.views-grid{grid-template-columns:1fr 1fr}.report-summary{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M13 2C9 7 6 10.5 6 15a7 7 0 0 0 14 0c0-2.4-1-4.3-2.4-6 .3 2-.4 3.4-1.6 4-0.2-2.6-1.4-4.8-3-6.6C12 8 11.3 9.6 11.3 11c0-3.2 1-6.4 1.7-9Z" fill="url(#g)"/><defs><linearGradient id="g" x1="6" y1="2" x2="20" y2="22"><stop stop-color="#8B7CFF"/><stop offset="1" stop-color="#FFB454"/></linearGradient></defs></svg>
      <div><p class="brand-name">Loopfire</p><p class="brand-sub">MARKETING OPS</p></div>
    </div>
    <nav class="nav">
      <div class="nav-section">Heute</div>
      <button class="nav-item active" data-view="today"><span>✓</span><span>Tasks for Today</span><span class="nav-count" id="today-count"></span></button>
      <button class="nav-item" data-view="dashboard"><span>◫</span><span>Dashboard</span></button>
      <div class="nav-section">CRM</div>
      <button class="nav-item" data-view="contacts"><span>◎</span><span>Kontakte</span><span class="nav-count" id="contact-count"></span></button>
      <button class="nav-item" data-view="tasks"><span>☑</span><span>Marketing Tasks</span><span class="nav-count" id="task-count"></span></button>
      <button class="nav-item" data-view="campaigns"><span>◉</span><span>Kampagnen</span></button>
      <div class="nav-section">Content</div>
      <button class="nav-item" data-view="planner"><span>▦</span><span>Content Planner</span></button>
      <button class="nav-item" data-view="posts"><span>▤</span><span>Post Library</span></button>
      <button class="nav-item" data-view="assets"><span>▱</span><span>Asset Library</span></button>
      <button class="nav-item" data-view="templates"><span>✦</span><span>Templates</span></button>
      <div class="nav-section">Auswertung</div>
      <button class="nav-item" data-view="timeline"><span>↗</span><span>Marketing Timeline</span></button>
      <button class="nav-item" data-view="report"><span>▥</span><span>Weekly Report</span></button>
    </nav>
    <div class="sidebar-foot"><span id="storage-mode">Initialisiere Datenbank …</span></div>
  </aside>

  <main class="main">
    <div id="error-banner" class="error-banner hidden"></div>

    <section id="view-today" class="view"></section>
    <section id="view-dashboard" class="view hidden"></section>
    <section id="view-contacts" class="view hidden"></section>
    <section id="view-tasks" class="view hidden"></section>
    <section id="view-campaigns" class="view hidden"></section>
    <section id="view-planner" class="view hidden"></section>
    <section id="view-posts" class="view hidden"></section>
    <section id="view-assets" class="view hidden"></section>
    <section id="view-templates" class="view hidden"></section>
    <section id="view-timeline" class="view hidden"></section>
    <section id="view-report" class="view hidden"></section>
  </main>
</div>

<div id="contact-drawer-overlay" class="drawer-overlay hidden">
  <div class="backdrop" data-close="contact"></div>
  <div class="drawer">
    <div class="drawer-head"><h2 id="contact-drawer-title">Neuer Kontakt</h2><button class="icon-btn" data-close="contact">✕</button></div>
    <div class="drawer-body">
      <div class="section-title">Basisdaten</div>
      <div class="field"><label>Name</label><input id="c-name" placeholder="z. B. Sarah Plays"/></div>
      <div class="field-row">
        <div class="field"><label>Typ</label><select id="c-type"><option value="creator">Content Creator</option><option value="press">Presse / Media</option></select></div>
        <div class="field"><label>Plattform</label><select id="c-platform"></select></div>

async function upsert(collectionName,id,data){
  const now=new Date().toISOString();
  const record={...data,id:id||uid(),updatedAt:now};
  if(!id)record.createdAt=now;
  if(db){
    const payload={...record,recordType:collectionName};delete payload.id;
    payload.updatedAt=fs.serverTimestamp();
    if(id)await fs.setDoc(fs.doc(db,FIRESTORE_COLLECTION,id),payload,{merge:true});
    else{
      payload.createdAt=fs.serverTimestamp();
      const ref=await fs.addDoc(fs.collection(db,FIRESTORE_COLLECTION),payload);
      record.id=ref.id;
    }
  }else saveLocal(collectionName,record);
  return record;
}

function renderPlanner(){
  const d=state.calendarDate;const year=d.getFullYear(),month=d.getMonth();
  const first=new Date(year,month,1);const offset=(first.getDay()+6)%7;const gridStart=new Date(year,month,1-offset);
  const days=Array.from({length:42},(_,i)=>{const x=new Date(gridStart);x.setDate(gridStart.getDate()+i);return x});
  const monthLabel=new Intl.DateTimeFormat("de-DE",{month:"long",year:"numeric"}).format(d);
  el("view-planner").innerHTML=`
    <header class="page-header page-header-row"><div><h1>Content Planner</h1><p>Content grafisch im Kalender planen und mit Spielen verknüpfen.</p></div><button class="btn-primary" data-add="content">+ Content planen</button></header>
    <div class="calendar-shell">
      <div class="calendar-head"><button class="icon-btn" id="cal-prev">←</button><div class="calendar-title">${monthLabel}</div><div><button class="btn-ghost" id="cal-today">Heute</button><button class="icon-btn" id="cal-next">→</button></div></div>
      <div class="calendar-grid">${["Mo","Di","Mi","Do","Fr","Sa","So"].map(x=>`<div class="calendar-weekday">${x}</div>`).join("")}
      ${days.map(day=>{
        const iso=new Date(day.getTime()-day.getTimezoneOffset()*60000).toISOString().slice(0,10);
        const items=state.planner.filter(x=>x.date===iso);
        return `<div class="calendar-day ${day.getMonth()!==month?"outside":""} ${iso===todayISO()?"today":""}" data-calendar-date="${iso}"><div class="day-number">${day.getDate()}</div>${items.slice(0,4).map(x=>`<div class="calendar-item" title="${esc(x.title)}" data-edit-content="${x.id}">${esc(x.channel)} · ${esc(x.title)}</div>`).join("")}${items.length>4?`<div class="muted" style="font-size:9px">+${items.length-4} weitere</div>`:""}</div>`;
      }).join("")}</div>
    </div>`;
  el("cal-prev").addEventListener("click",()=>{state.calendarDate=new Date(year,month-1,1);renderPlanner()});
  el("cal-next").addEventListener("click",()=>{state.calendarDate=new Date(year,month+1,1);renderPlanner()});
  el("cal-today").addEventListener("click",()=>{state.calendarDate=new Date();renderPlanner()});
  document.querySelectorAll("[data-calendar-date]").forEach(day=>day.addEventListener("dblclick",()=>openEntityModal("content",{date:day.dataset.calendarDate})));
  wireCommonActions();
}

function renderReport(){

  const acts=state.activities.filter(a=>inCurrentWeek(a.eventAt||a.createdAt)&&ownerMatch(a));
  const tasks=state.tasks.filter(t=>inCurrentWeek(t.updatedAt||t.createdAt)&&(owner==="all"||t.assignee===owner));
  const contacts=state.contacts.filter(c=>inCurrentWeek(c.createdAt)&&(owner==="all"||c.owner===owner));
  const emails=acts.filter(a=>["contact","email"].includes(a.type)||/kontakt|mail|outreach/i.test(a.action)).length;
  const replies=acts.filter(a=>a.type==="reply"||/antwort|reply/i.test(a.action)).length;
  const accepted=acts.filter(a=>a.type==="accepted"||/zusage|zugesagt/i.test(a.action)).length+state.contacts.filter(c=>inCurrentWeek(c.updatedAt)&&["negotiating","key_sent"].includes(c.status)&&(owner==="all"||c.owner===owner)).length;
  const postedContacts=state.contacts.filter(c=>c.status==="posted"&&inCurrentWeek(c.updatedAt)&&(owner==="all"||c.owner===owner));
  const videos=postedContacts.filter(c=>(Number(c.viewsByType?.video)||0)+(Number(c.viewsByType?.short)||0)>0).length;

      <div class="stat-card"><div class="stat-top"><span>Views</span></div><p class="stat-value">${formatCompact(totalViews)}</p><p class="stat-sub">veröffentlichte Inhalte</p></div>
      <div class="stat-card"><div class="stat-top"><span>Presseartikel</span></div><p class="stat-value">${articles}</p><p class="stat-sub">Presse / Article</p></div>
    </div>
    <div class="report-hero">
      <div class="card"><div class="card-head"><h2>Team-Output</h2><span class="muted">${owner==="all"?"Gesamtes Team":esc(owner)}</span></div>
        <div class="report-summary">
          <div class="report-metric"><strong>${contacts.length}</strong><span>neue Creator / Kontakte</span></div>

        </div>
      </div>
      <div class="card"><div class="card-head"><h2>Aktivitäten dieser Woche</h2></div>${timelineHtml(sortByEvent(acts).slice(0,7))}</div>
    </div>`;
  el("report-owner").addEventListener("change",e=>{state.reportOwner=e.target.value;renderReport()});
}

function renderContactStatic(){
  el("c-platform").innerHTML=PLATFORMS.map(([id,l])=>`<option value="${id}">${l}</option>`).join("");
  el("c-priority").innerHTML=PRIORITIES.map(p=>`<button type="button" data-priority="${p.id}">${p.label}</button>`).join("");
  el("c-views-grid").innerHTML=VIEW_TYPES.map(([id,l])=>`<div class="field"><label>${l}</label><input id="c-view-${id}" type="number" min="0" placeholder="0"/></div>`).join("");
}
function openContact(contact=null){
  state.activeContact=contact||null;
  const base=structuredClone(EMPTY_CONTACT);
  state.contactForm={...base,...(contact||{}),tags:Array.isArray(contact?.tags)?[...contact.tags]:[],contentTypes:Array.isArray(contact?.contentTypes)?[...contact.contentTypes]:[],viewsByType:{...base.viewsByType,...(contact?.viewsByType||{})}};
  el("contact-drawer-title").textContent=contact?"Kontakt bearbeiten":"Neuer Kontakt";
  el("contact-delete").classList.toggle("hidden",!contact);
  fillContactForm();
  el("contact-drawer-overlay").classList.remove("hidden");
}
function closeContact(){el("contact-drawer-overlay").classList.add("hidden")}
function fillContactForm(){
  const f=state.contactForm;
  ["name","type","platform","game","owner","email","profileUrl","followers","lastContactAt","lastReplyAt","reminderAt","contentUrl","notes","fitReason"].forEach(k=>el(`c-${k}`).value=f[k]??"");
  el("c-tags").value=(f.tags||[]).join(", ");
  el("c-keySent").checked=!!f.keySent;
  VIEW_TYPES.forEach(([id])=>el(`c-view-${id}`).value=f.viewsByType?.[id]||"");
  renderContactChips();renderContactPriority();renderContactStepper();
}
function renderContactChips(){
  el("c-contentTypes").innerHTML=CONTENT_TYPES.map(([id,l])=>`<button type="button" data-ctype="${id}" class="${state.contactForm.contentTypes.includes(id)?"active":""}">${l}</button>`).join("");
  el("c-contentTypes").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{const id=b.dataset.ctype;state.contactForm.contentTypes=state.contactForm.contentTypes.includes(id)?state.contactForm.contentTypes.filter(x=>x!==id):[...state.contactForm.contentTypes,id];renderContactChips()}));
}
function renderContactPriority(){
  el("c-priority").querySelectorAll("button").forEach(b=>b.classList.toggle("active",b.dataset.priority===state.contactForm.priority));
}
function renderContactStepper(){
  const idx=PIPELINE.findIndex(x=>x.id===state.contactForm.status);
  el("c-stepper").innerHTML=`<div class="stepper-track">${PIPELINE.map((s,i)=>`<button type="button" class="stepper-node" data-contact-status="${s.id}" title="${s.label}" style="border-color:${i<=idx?s.color:"#2C303C"};background:${i<=idx?s.color:"transparent"}"></button>${i<PIPELINE.length-1?`<span class="stepper-connector" style="background:${i<idx?s.color:"#2C303C"}"></span>`:""}`).join("")}</div><div class="stepper-labels">${PIPELINE.map(s=>`<span>${s.label.split(" ")[0]}</span>`).join("")}</div>`;
  el("c-stepper").querySelectorAll("[data-contact-status]").forEach(b=>b.addEventListener("click",()=>{state.contactForm.status=b.dataset.contactStatus;renderContactStepper()}));
}
async function saveContact(){
  const f=state.contactForm;
  ["name","type","platform","game","owner","email","profileUrl","followers","lastContactAt","lastReplyAt","reminderAt","contentUrl","notes","fitReason"].forEach(k=>f[k]=el(`c-${k}`).value);
  f.tags=el("c-tags").value.split(",").map(x=>x.trim()).filter(Boolean);
  f.keySent=el("c-keySent").checked;f.followers=Number(f.followers)||0;
  VIEW_TYPES.forEach(([id])=>f.viewsByType[id]=Number(el(`c-view-${id}`).value)||0);
  f.views=sumViews(f);
  if(!f.name.trim())return;
  const old=state.activeContact;
  const saved=await upsert(COLLECTIONS.contacts,old?.id,f);
  const actions=[];
  if(!old)actions.push({text:`${f.name} als Kontakt angelegt`,type:"contact"});
  if(f.lastContactAt&&f.lastContactAt!==old?.lastContactAt)actions.push({text:`${f.name} kontaktiert`,type:"contact"});
  if(f.lastReplyAt&&f.lastReplyAt!==old?.lastReplyAt)actions.push({text:`${f.name} antwortete`,type:"reply"});
  if(f.status!==old?.status)actions.push({text:`${f.name}: Status auf „${statusById(f.status).label}“ gesetzt`,type:f.status==="posted"?"posted":"status"});
  if(f.keySent&&!old?.keySent)actions.push({text:`Key an ${f.name} gesendet`,type:"key_sent"});
  if(f.reminderAt&&f.reminderAt!==old?.reminderAt)actions.push({text:`Follow-up für ${f.name} auf ${formatDate(f.reminderAt)} gesetzt`,type:"follow_up"});
  for(const a of actions)await logActivity(a.text,a.type,{actor:f.owner||"Team",linkedContactId:saved.id,linkedGame:f.game});
  closeContact();if(!db)render();
}
async function deleteContact(){
  if(!state.activeContact)return;
  const c=state.activeContact;
  await removeRecord(COLLECTIONS.contacts,c.id);
  await logActivity(`${c.name} aus Kontakten gelöscht`,"contact",{actor:c.owner||"Team",linkedGame:c.game});
  closeContact();if(!db)render();
}

function field(id,label,value="",type="text",extra=""){
  return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${esc(value??"")}" ${extra}/></div>`;
}
function selectField(id,label,options,value=""){
  return `<div class="field"><label>${label}</label><select id="${id}">${options.map(([v,l])=>`<option value="${esc(v)}" ${v===value?"selected":""}>${esc(l)}</option>`).join("")}</select></div>`;
}
function textArea(id,label,value="",placeholder=""){
  return `<div class="field"><label>${label}</label><textarea id="${id}" placeholder="${esc(placeholder)}">${esc(value||"")}</textarea></div>`;
}
function openEntityModal(kind,record=null){
  state.entityKind=kind;state.activeEntity=record?.id?record:null;

  const titles={task:"Marketing Task",campaign:"Kampagne",content:"Content planen",post:"Post",asset:"Asset",template:"Template",activity:"Aktivität"};
  el("entity-modal-title").textContent=`${record?.id?"Bearbeiten":"Neu"} · ${titles[kind]}`;
  el("entity-delete").classList.toggle("hidden",!record?.id);
  el("entity-modal-body").innerHTML=entityFormHtml(kind,seed);
  el("entity-modal-overlay").classList.remove("hidden");
}
function closeEntity(){el("entity-modal-overlay").classList.add("hidden");state.entityKind=null;state.activeEntity=null}

    <div class="field-row">${field("e-published","Veröffentlicht (manuell)",r.published||0,"number",'min="0"')}${field("e-declined","Abgesagt (manuell)",r.declined||0,"number",'min="0"')}</div>
    <div class="notice-banner">Bei verknüpftem Spiel werden Kontakt-, Zusage-, Veröffentlichungs- und Absagezahlen automatisch aus den Kontakten berechnet.</div>`;

    ${field("e-title","Titel",r.title||"")}<div class="field-row">${selectField("e-channel","Kanal",CHANNELS.map(x=>[x,x]),r.channel||CHANNELS[0])}${field("e-date","Datum",r.date||todayISO(),"date")}</div>

function value(id){return el(id)?.value??""}
async function saveEntity(){
  const k=state.entityKind,r=state.activeEntity,id=r?.id;let data,collection,activityText,activityType=k;
  if(k==="task"){data={title:value("e-title"),description:value("e-description"),priority:value("e-priority"),deadline:value("e-deadline"),status:value("e-status"),assignee:value("e-assignee"),linkedContactId:value("e-contact"),linkedGame:value("e-game")};collection=COLLECTIONS.tasks;activityText=`Task „${data.title}“ ${id?"aktualisiert":"erstellt"}`}
  else if(k==="campaign"){data={title:value("e-title"),status:value("e-status"),startDate:value("e-start"),endDate:value("e-end"),linkedGame:value("e-game"),description:value("e-description"),plannedCreators:Number(value("e-planned"))||0,contacted:Number(value("e-contacted"))||0,accepted:Number(value("e-accepted"))||0,published:Number(value("e-published"))||0,declined:Number(value("e-declined"))||0};collection=COLLECTIONS.campaigns;activityText=`Kampagne „${data.title}“ ${id?"aktualisiert":"erstellt"}`}
  else if(k==="content"){data={title:value("e-title"),channel:value("e-channel"),date:value("e-date"),status:value("e-status"),linkedGame:value("e-game"),notes:value("e-notes")};collection=COLLECTIONS.planner;activityText=`Content „${data.title}“ für ${formatDate(data.date)} geplant`;activityType="content"}
  else if(k==="post"){data={title:value("e-title"),platform:value("e-platform"),status:value("e-status"),linkedGame:value("e-game"),body:value("e-body"),publishDate:value("e-date"),views:Number(value("e-views"))||0,engagement:Number(value("e-engagement"))||0,url:value("e-url")};collection=COLLECTIONS.posts;activityText=`Post „${data.title}“ ${data.status==="published"?"veröffentlicht":id?"aktualisiert":"erstellt"}`;activityType=data.status==="published"?"posted":"post"}
  else if(k==="asset"){data={title:value("e-title"),type:value("e-type"),linkedGame:value("e-game"),url:value("e-url"),notes:value("e-notes")};collection=COLLECTIONS.assets;activityText=`Asset „${data.title}“ hinzugefügt`;activityType="asset"}
  else if(k==="template"){data={title:value("e-title"),category:value("e-category"),subject:value("e-subject"),body:value("e-body")};collection=COLLECTIONS.templates;activityText=`Template „${data.title}“ ${id?"aktualisiert":"erstellt"}`;activityType="template"}
  else{data={action:value("e-action"),actor:value("e-actor"),type:value("e-type"),eventAt:new Date(value("e-datetime")).toISOString(),linkedContactId:value("e-contact"),linkedGame:value("e-game"),details:value("e-details")};collection=COLLECTIONS.activities}
  if(!(data.title||data.action))return;
  await upsert(collection,id,data);
  if(k!=="activity")await logActivity(activityText,activityType,{actor:data.assignee||"Team",linkedContactId:data.linkedContactId,linkedGame:data.linkedGame});
  closeEntity();if(!db)render();
}
async function deleteEntity(){
  if(!state.activeEntity)return;
  const collectionMap={task:COLLECTIONS.tasks,campaign:COLLECTIONS.campaigns,content:COLLECTIONS.planner,post:COLLECTIONS.posts,asset:COLLECTIONS.assets,template:COLLECTIONS.templates,activity:COLLECTIONS.activities};
  await removeRecord(collectionMap[state.entityKind],state.activeEntity.id);
  closeEntity();if(!db)render();
}

async function initFirebase(){
  try{
    const [{initializeApp},firestoreModule]=await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js")
    ]);
    fs=firestoreModule;
    const app=initializeApp(firebaseConfig);
    // Ohne zweiten Parameter wird die Firestore-Standarddatenbank „(default)“ verwendet.
    db=fs.getFirestore(app);
    state.dbMode="firestore";state.error=null;
    const unsub=fs.onSnapshot(fs.collection(db,FIRESTORE_COLLECTION),snap=>{
      const records=snap.docs.map(d=>({id:d.id,...d.data()}));
      Object.entries(COLLECTIONS).forEach(([key,name])=>{
        state[key]=records.filter(record=>record.recordType===name);
      });
      state.loading=false;render();
    },err=>{
      console.error(err);state.error=`Firestore-Fehler in „${FIRESTORE_COLLECTION}“: ${err.message}. Lokale Daten bleiben verfügbar.`;render();
    });
    listeners.push(unsub);
    render();
  }catch(err){
    console.error("Firebase nicht erreichbar:",err);
    db=null;state.dbMode="local";
    state.error="Firebase/Firestore ist nicht erreichbar. Die App läuft im lokalen Browser-Modus weiter.";
    render();
  }
}
initFirebase();
